<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TP Evaluativo - FastAPI & JS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

<nav class="bg-slate-900 shadow-md p-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      
      <div class="flex items-center gap-3">
        <img src="image/logo-removebg-preview.png" alt="Logo F&F" class="w-20 h-20 object-contain brightness-0 invert">
        <span class="text-4xl font-extrabold bg-gradient-to-r from-blue-500 to-cyan-300 bg-clip-text text-transparent tracking-wider">
          F&F
        </span>
      </div>

      <div class="flex gap-4">
        <button id="nav-lista-btn" class="text-white font-bold border-b-2 border-white px-2 py-1 transition-all">
          Ver Artículos
        </button>
        <button id="nav-favs-btn" class="text-blue-200 hover:text-white px-2 py-1 transition-all">
          Favoritos
        </button>
        <button id="nav-form-btn" class="text-blue-200 hover:text-white px-2 py-1 transition-all">
          Nuevo Artículo
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-8">

    <div id="seccion-lista" class="block">
      <h1 class="text-3xl font-bold mb-6 text-gray-700">Todos los Artículos</h1>
      <div id="galeria-articulos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        </div>
    </div>

    <div id="seccion-favoritos" class="hidden">
      <h1 class="text-3xl font-bold mb-6 text-yellow-600">Mis Favoritos</h1>
      <div id="galeria-favoritos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        </div>
    </div>

    <div id="seccion-formulario" class="hidden max-w-md mx-auto bg-white p-6 rounded shadow">
      <h2 id="titulo-form" class="font-bold text-2xl mb-4 text-blue-600">Crear Artículo</h2>
      
      <form id="form-articulo" class="flex flex-col gap-4">
        <input type="hidden" id="form-id">
  
        <div>
          <label class="text-sm text-gray-500 block mb-1">Nombre</label>
          <input type="text" id="form-nombre" required class="border p-2 rounded w-full bg-gray-50">
        </div>

        <div>
          <label class="text-sm text-gray-500 block mb-1">Marca</label>
          <input type="text" id="form-marca" required class="border p-2 rounded w-full bg-gray-50">
        </div>

        <div>
          <label class="text-sm text-gray-500 block mb-1">Precio</label>
          <input type="number" step="0.01" id="form-precio" required class="border p-2 rounded w-full bg-gray-50">
        </div>

        <label class="flex items-center gap-2">
          <input type="checkbox" id="form-activo" checked> Activo
        </label>

        <button type="submit" class="bg-blue-500 text-white py-2 rounded mt-4 hover:bg-blue-600 font-bold transition-colors">
          Guardar
        </button>
      </form>
    </div>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
