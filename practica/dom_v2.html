<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List</title>
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-zinc-950 text-white flex justify-center pt-10 min-h-screen">
  <div class="w-full max-w-md">
    <h1 class="text-4xl font-bold mb-2">To-Do List</h1>

    <form id="taskForm" class="flex gap-2 mb-2">
      <input type="text" id="taskInput" class="flex-1 p-2 rounded bg-zinc-800 text-white" placeholder="Add a new task...">

      <select id="prioritySelect" class="p-2 rounded bg-zinc-800 text-white">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Add</button>
    </form>


    <!-- Search -->
    <input 
      type="text" 
      id="searchInput" 
      class="w-full p-2 mb-4 rounded bg-zinc-800 text-white" 
      placeholder="Search tasks..."
    >

    <!-- Filters -->

    <div class="flex gap-2 mb-4">
      <button data-filter="all" class="bg-zinc-500 hover:bg-zinc-700 text-white font-bold py-2 px-4 rounded filter-btn">All</button>
      <button data-filter="completed" class="bg-zinc-500 hover:bg-zinc-700 text-white font-bold py-2 px-4 rounded filter-btn">Completed</button>
      <button data-filter="pending" class="bg-zinc-500 hover:bg-zinc-700 text-white font-bold py-2 px-4 rounded filter-btn">Pending</button>
    </div>

    <ul id="taskList">

    </ul>

  </div>
  <script src="dom_v2.js"></script>
</body>

</html>
