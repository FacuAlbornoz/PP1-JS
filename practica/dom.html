<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase Dom + Eventos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="font-sans m-8">
    <h1 class="text-2xl font-bold mb-4">DOM + Eventos</h1>
    
    <section class="card p4 border-gray-300 reunded-2xl mb-4" id="demo-dom">
        <h2 class="text-xl font-semibold mb-2">Demo DOM</h2>
        <p id="parrafo">Hola <strong>mundo</strong> !!!</p>
        <button id="btnCambiar" class="cursor-pointer mt-2 px-3 py-1 bg-blue-500 text-white rounded-md hover:bg-blue-600">Cambiar Texto</button>
    </section>

    <section class="card p4 border-gray-300 reunded-2xl mb-4" id="demo-eventos">
        <h2 class="text-xl font-semibold mb-2">Demo Eventos</h2>
        <a href="https://tailwindcss.com/" id="linkTailwind" class="text-blue-600 underline hover:text-blue-800">
            Ir a Tailwind CSS
        </a>
    </section>

    <section class="card p4 border-gray-300 reunded-2xl mb-4" id="app-tools">
        <h2 class="text-xl font-semibold mb-2">Mini proyecto: To do</h2>
            <form id="formTodo" autocomplete="off" class="flex gap-2 mb-3">
                <label class="sr-only" for="inputTodo">Nueva tarea</label>
                <input id="inputTodo" name="Titulo" placeholder="Escribe una tarea..." requiered class="flex-1 border border-gray-300 rounded-md px-2 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
                <button type="submit" class="px-3 py-1 bg-green-500 text-white rounded-md hover:bg-green-600">Agregar</button>               
            </form>
        <ul class="todo space-y-1" id="lista"> </ul>
    </section>
    
    <script src="dom.js"></script>
</body>
</html>
